# Layout B — Tile Grid (spec §1 Decision 6). Standard HA cards only.
# Entity ids are PLACEHOLDERS — wire to real entities on hardware setup.
title: Kitchen
views:
  - title: Home
    type: sections
    sections:
      # Hero column — clock/weather/voice anchor (Layout B left hero)
      - type: grid
        cards:
          - type: clock            # native HA clock card
          - type: weather-forecast
            entity: weather.home   # PLACEHOLDER
          - type: button
            name: Hold to talk
            icon: mdi:microphone
            tap_action:
              action: assist        # opens HA Assist (voice) — native
          - type: custom:screensaver-card
            media_path: media
            photo_duration: 10
            # idle_entity defaults to input_boolean.kitchen_idle
      # Groceries
      - type: grid
        cards:
          - type: todo-list
            entity: todo.groceries  # PLACEHOLDER (local_todo canonical, spec M-2)
      # Calendar + chores
      - type: grid
        cards:
          - type: calendar
            entities:
              - calendar.family     # PLACEHOLDER
          - type: todo-list
            entity: todo.chores     # PLACEHOLDER
# Screensaver: the custom card (custom:screensaver-card) is now instantiated in
# the hero grid section above. It renders nothing unless idle, driven by the
# kitchen_idle automation (packages/screensaver.yaml, Task 4). Its JS resource
# (/local/screensaver-card.js, registered as a dashboard resource in HA) remains
# a hardware-phase INSTALL.md step — see deploy/INSTALL.md.
